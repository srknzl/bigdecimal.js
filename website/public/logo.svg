<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="BigDecimal.js logo">
  <defs>
    <linearGradient id="bd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c026d3"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="30" height="30" rx="8" fill="url(#bd)"/>
  <!-- "B" + a decimal point: Big + decimal, and the dot literally is the decimal point. -->
  <text x="13" y="23" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="20" font-weight="800" fill="#fff">B</text>
  <circle cx="22.4" cy="21.2" r="2.7" fill="#fff"/>
</svg>
