version: 2
updates:
  # All dependencies are devDependencies — the published package has zero
  # runtime deps — so these PRs never affect the shipped artifact.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      # Bundle only non-breaking updates so a single breaking major can't hold
      # the whole batch hostage (as TS 7 / chai 6 did). Majors arrive as
      # separate PRs to review and merge one migration at a time.
      dev-dependencies:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      # ESM-only since v5 → breaks the CommonJS test setup on Node 18.
      # Revisit when Node 18 is dropped or tests move to ESM.
      - dependency-name: chai
        update-types: [version-update:semver-major]
      # TypeScript 7 = native-compiler rewrite; emit/behavior risk for a tsc-generated
      # library. Upgrade deliberately, not on a weekly bot cadence.
      - dependency-name: typescript
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - '*'
