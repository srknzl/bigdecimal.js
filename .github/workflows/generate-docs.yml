name: API Docs
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  Generate-Docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v2
      - name: Install
        run: |
          npm i
      - name: Generate docs
        run: |
          npm run docs
